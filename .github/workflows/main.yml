name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # <-- ISSO AQUI CRIA O BOTÃO PARA RODAR MANUALMENTE

permissions:
  contents: write # <-- ISSO AQUI DÁ PERMISSÃO PARA O GITHUB SALVAR A IMAGEM

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: jukiaoliveira
          outputs: |
            dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
